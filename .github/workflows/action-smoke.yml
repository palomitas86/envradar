name: action-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - id: envradar
        uses: ./
        with:
          fail-on-findings: "false"
          report-format: markdown
      - name: Check action outputs
        shell: bash
        run: |
          test -n "${{ steps.envradar.outputs.scanned-files }}"
          test -n "${{ steps.envradar.outputs.strict-findings }}"
